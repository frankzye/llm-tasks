# Build and publish the `chat/` package to the npm registry.
# Triggers on version tags under `chat/` (e.g. chat-v0.1.0) or manual run.
#
# Setup:
# 1. Create an npm automation token: https://docs.npmjs.com/creating-and-viewing-access-tokens
# 2. Add repository secret NPM_TOKEN (classic) or use OIDC with "trusted publishing" on npm.
#
# Before publishing, bump `version` in chat/package.json (or use npm version from chat/).

name: Publish chat to npm

on:
  push:
    tags:
      - "chat-v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: chat

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          registry-url: 'https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          registry-url: 'https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci && npm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
